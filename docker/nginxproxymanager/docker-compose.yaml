services:
  nginxproxymanager:
    container_name: nginxproxymanager
    image: jc21/nginx-proxy-manager:latest
    ports:
      - '80:80'
      - '443:443'
      # - '81:81' # Admin Web Port
      # - '21:21' # FTP
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    environment:
      DISABLE_IPV6: 'true'
    restart: unless-stopped
     
networks:
  default:
    external: true
    name: npm