services:
  pgadmin:
    image: dpage/pgadmin4:8.9
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - 8888:80
    environment:
      - PGADMIN_DEFAULT_EMAIL:${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD:${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    env_file:
      - .env
networks:
  kestra_default:
    external: true
volumes:
  pgadmin-data:
    driver: local
